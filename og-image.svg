<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Red accent left bar -->
  <rect x="0" y="0" width="5" height="630" fill="#F80000"/>

  <!-- Background glow -->
  <radialGradient id="glow" cx="30%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#F80000" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Diagonal lines texture -->
  <pattern id="lines" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(-55)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#F80000" stroke-width="0.4" stroke-opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#lines)"/>

  <!-- Logo -->
  <text x="80" y="210" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="96" fill="#F2F2F2" letter-spacing="6">ANTOSHKA</text>
  <text x="80" y="210" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="96" fill="#F2F2F2" letter-spacing="6" x="836" dy="0">
    <tspan fill="#F80000">.</tspan>
  </text>
  <text x="836" y="210" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="96" fill="#F80000">.</text>
  <text x="874" y="210" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="96" fill="#F2F2F2" letter-spacing="6">DEV</text>

  <!-- Red divider -->
  <rect x="80" y="240" width="320" height="2" fill="#F80000" opacity="0.6"/>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Arial, sans-serif" font-weight="400" font-size="36" fill="#F2F2F2" opacity="0.55" letter-spacing="8">VIDEOS · REDES SOCIALES</text>

  <!-- Bottom platforms -->
  <text x="80" y="440" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#F2F2F2" opacity="0.25" letter-spacing="5">META ADS  ·  INSTAGRAM REELS  ·  TIKTOK  ·  YOUTUBE SHORTS</text>

  <!-- Bottom red line -->
  <rect x="0" y="620" width="1200" height="10" fill="#F80000" opacity="0.5"/>
</svg>
